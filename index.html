<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Feed</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #94a3b8;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            background: #ffffff;
            padding: 10px 15px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 24px;
        }

        .logo img {
            height: 30px;
            display: block;
        }

        .header-section {
            margin-bottom: 30px;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
        }

        .badge {
            background-color: rgba(234, 179, 8, 0.15);
            color: #facc15;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        /* Personalized Job Recommendation Button Styling */
        .recommendation-btn-container {
            margin-top: 16px;
            margin-bottom: 30px;
        }

        .btn-personalized-jobs {
            display: inline-flex;
            align-items: center;
            background-color: #facc15;
            color: #0b0f19;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-personalized-jobs:hover {
            background-color: #eab308;
        }

        .btn-personalized-jobs:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo Area -->
        <div class="logo">
            <span style="color: #0b0f19; font-weight: bold; font-size: 18px;">Allshore Global</span>
        </div>

        <!-- Header Section -->
        <div class="header-section">
            <div class="title-row">
                <h1>AI Job Feed</h1>
                <span class="badge">CURRENT AI JOB FEED</span>
            </div>
            <p class="subtitle">Explore current AI job opportunities and live talent listings updated regularly.</p>
            
            <!-- Button Added Here -->
            <div class="recommendation-btn-container">
                <a href="https://www.allshoreglobal.com/join-as-talent" target="_blank" rel="noopener noreferrer" class="btn-personalized-jobs">
                    Fill this form to get personalised job recommendations
                </a>
            </div>
        </div>
    </div>

</body>
</html>
