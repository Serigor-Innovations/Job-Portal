<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Feed - Allshore Global</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #94a3b8;
            padding: 30px 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header-section {
            margin-bottom: 25px;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
        }

        .badge {
            background-color: rgba(234, 179, 8, 0.15);
            color: #facc15;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        .recommendation-btn-container {
            margin-bottom: 25px;
        }

        .btn-personalized-jobs {
            display: inline-flex;
            align-items: center;
            background-color: #facc15;
            color: #0b0f19;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-personalized-jobs:hover {
            background-color: #eab308;
        }

        .filters-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .search-bar {
            width: 100%;
            background-color: #111827;
            border: 1px solid #1f2937;
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .filter-select, .filter-input {
            background-color: #111827;
            border: 1px solid #1f2937;
            color: #94a3b8;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            width: 100%;
        }

        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 15px;
            color: #94a3b8;
        }

        .clear-filters {
            color: #facc15;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .clear-filters:hover {
            text-decoration: underline;
        }

        .table-container {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 8px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }

        th {
            color: #64748b;
            font-weight: 600;
            padding: 14px 16px;
            border-bottom: 1px solid #1f2937;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #1f2937;
            color: #e2e8f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .job-title {
            color: #ffffff;
            font-weight: 600;
        }

        .level-badge {
            background-color: #1e293b;
            color: #facc15;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .btn-apply {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .btn-apply:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <div class="title-row">
                <h1>AI Job Feed</h1>
                <span class="badge">CURRENT AI JOB FEED</span>
            </div>
            <p class="subtitle">Explore current AI job opportunities and live talent listings updated regularly.</p>
            
            <div class="recommendation-btn-container">
                <a href="https://www.allshoreglobal.com/join-as-talent" target="_blank" rel="noopener noreferrer" class="btn-personalized-jobs">
                    Fill this form to get personalised job recommendations
                </a>
            </div>
        </div>

        <div class="filters-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search role title, e.g. LLM Engineer, AI Agent Developer">
            
            <div class="filter-row">
                <select id="companyFilter" class="filter-select"><option value="">Company</option></select>
                <select id="locationFilter" class="filter-select"><option value="">All locations</option></select>
                <select id="remoteFilter" class="filter-select"><option value="">Remote or onsite</option></select>
                <select id="levelFilter" class="filter-select"><option value="">All experience levels</option></select>
                <select id="typeFilter" class="filter-select"><option value="">All job types</option></select>
                <select id="industryFilter" class="filter-select"><option value="">All industries</option></select>
                <input type="text" id="skillInput" class="filter-input" placeholder="Skill or stack, e.g. PyTorch">
            </div>

            <div class="filter-row" style="grid-template-columns: 180px 180px;">
                <input type="text" id="salaryInput" class="filter-input" placeholder="Min salary">
                <select id="dateFilter" class="filter-select">
                    <option value="">Posted in last 10 days</option>
                    <option value="3">Posted in last 3 days</option>
                    <option value="1">Posted today</option>
                </select>
            </div>
        </div>

        <div class="results-info">
            <span id="resultCount">100 jobs from the last 10 days</span>
            <button id="clearFiltersBtn" class="clear-filters">Clear all filters</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Company</th>
                        <th>Location</th>
                        <th>Remote</th>
                        <th>Level</th>
                        <th>Type</th>
                        <th>Apply</th>
                    </tr>
                </thead>
                <tbody id="jobTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const companies = ["A.Team", "Prime Intellect", "OpenAI", "Anthropic", "Scale AI", "Hugging Face", "Cohere", "DeepMind", "DataRobot", "Perplexity"];
        const locations = ["San Francisco", "New York", "Americas, Europe, Israel", "London", "Remote", "Berlin", "Austin", "Toronto"];
        const roles = [
            "Senior Independent AI Engineer / Architect", "Applied AI Product Strategy & Revenue Lead", 
            "LLM Fine-tuning Specialist", "AI Agent Developer", "Machine Learning Infrastructure Engineer", 
            "Computer Vision Research Scientist", "NLP Core Engineer", "Prompt Engineer & Evaluator", 
            "Full Stack AI App Developer", "Deep Learning Research Lead"
        ];
        const types = ["contract", "full-time", "part-time"];
        const levels = ["1-3", "3-5", "5-10", "8+"];
        const industries = ["Generative AI", "Enterprise Software", "Autonomous Systems", "Healthcare AI", "Fintech"];

        // Real specific job application link targets can be inserted here per item
        const sampleJobLinks = [
            "https://www.a.team",
            "https://www.primeintellect.ai",
            "https://openai.com/careers",
            "https://www.anthropic.com/careers",
            "https://scale.com/careers"
        ];

        let jobsData = [];

        for (let i = 1; i <= 100; i++) {
            jobsData.push({
                id: i,
                title: `${roles[(i - 1) % roles.length]} (${i})`,
                company: companies[(i - 1) % companies.length],
                location: locations[(i - 1) % locations.length],
                remote: i % 3 === 0 ? "No" : "Yes",
                level: levels[(i - 1) % levels.length],
                type: types[(i - 1) % types.length],
                industry: industries[(i - 1) % industries.length],
                applyUrl: sampleJobLinks[(i - 1) % sampleJobLinks.length]
            });
        }

        const jobTableBody = document.getElementById('jobTableBody');
        const searchInput = document.getElementById('searchInput');
        const companyFilter = document.getElementById('companyFilter');
        const locationFilter = document.getElementById('locationFilter');
        const remoteFilter = document.getElementById('remoteFilter');
        const levelFilter = document.getElementById('levelFilter');
        const typeFilter = document.getElementById('typeFilter');
        const industryFilter = document.getElementById('industryFilter');
        const resultCount = document.getElementById('resultCount');
        const clearFiltersBtn = document.getElementById('clearFiltersBtn');

        function populateDropdowns() {
            [...new Set(jobsData.map(j => j.company))].forEach(c => companyFilter.innerHTML += `<option value="${c}">${c}</option>`);
            [...new Set(jobsData.map(j => j.location))].forEach(l => locationFilter.innerHTML += `<option value="${l}">${l}</option>`);
            [...new Set(jobsData.map(j => j.level))].forEach(lv => levelFilter.innerHTML += `<option value="${lv}">${lv} yrs</option>`);
            [...new Set(jobsData.map(j => j.type))].forEach(t => typeFilter.innerHTML += `<option value="${t}">${t}</option>`);
            [...new Set(jobsData.map(j => j.industry))].forEach(ind => industryFilter.innerHTML += `<option value="${ind}">${ind}</option>`);
        }

        function renderTable(data) {
            jobTableBody.innerHTML = '';
            if(data.length === 0) {
                jobTableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 30px;">No jobs found matching your criteria.</td></tr>`;
                resultCount.textContent = `0 jobs found`;
                return;
            }

            resultCount.textContent = `${data.length} jobs from the last 10 days`;
            
            data.forEach(job => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="job-title">${job.title}</span></td>
                    <td>${job.company}</td>
                    <td>${job.location}</td>
                    <td>${job.remote}</td>
                    <td><span class="level-badge">${job.level}</span></td>
                    <td>${job.type}</td>
                    <td><a href="${job.applyUrl}" target="_blank" rel="noopener noreferrer" class="btn-apply">Apply</a></td>
                `;
                jobTableBody.appendChild(row);
            });
        }

        function filterJobs() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedCompany = companyFilter.value;
            const selectedLocation = locationFilter.value;
            const selectedRemote = remoteFilter.value;
            const selectedLevel = levelFilter.value;
            const selectedType = typeFilter.value;
            const selectedIndustry = industryFilter.value;

            const filtered = jobsData.filter(job => {
                const matchesSearch = job.title.toLowerCase().includes(searchTerm) || job.company.toLowerCase().includes(searchTerm);
                const matchesCompany = !selectedCompany || job.company === selectedCompany;
                const matchesLocation = !selectedLocation || job.location === selectedLocation;
                const matchesRemote = !selectedRemote || job.remote === selectedRemote;
                const matchesLevel = !selectedLevel || job.level === selectedLevel;
                const matchesType = !selectedType || job.type === selectedType;
                const matchesIndustry = !selectedIndustry || job.industry === selectedIndustry;

                return matchesSearch && matchesCompany && matchesLocation && matchesRemote && matchesLevel && matchesType && matchesIndustry;
            });

            renderTable(filtered);
        }

        [searchInput, companyFilter, locationFilter, remoteFilter, levelFilter, typeFilter, industryFilter].forEach(element => {
            element.addEventListener('input', filterJobs);
            element.addEventListener('change', filterJobs);
        });

        clearFiltersBtn.addEventListener('click', () => {
            searchInput.value = '';
            companyFilter.value = '';
            locationFilter.value = '';
            remoteFilter.value = '';
            levelFilter.value = '';
            typeFilter.value = '';
            industryFilter.value = '';
            renderTable(jobsData);
        });

        populateDropdowns();
        renderTable(jobsData);
    </script>
</body>
</html>
